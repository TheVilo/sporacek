<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="width:100%;height:100%;background:#204432;font-family:'Plus Jakarta Sans',sans-serif;color:#E7D6B4;overflow:hidden;display:flex;flex-direction:column;position:relative;">

  <div style="position:absolute;bottom:-50px;right:-50px;width:200px;height:200px;color:rgba(231,214,180,0.05);"><dc-import name="SporacekMark" hint-size="200px,200px" style="display:block;width:200px;height:200px;color:rgba(231,214,180,0.05);"></dc-import></div>

  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;position:relative;z-index:1;">
    <div style="width:96px;height:96px;border-radius:50%;background:rgba(186,95,63,0.16);display:flex;align-items:center;justify-content:center;margin-bottom:28px;">
      <div style="width:58px;height:58px;border-radius:50%;background:#BA5F3F;display:flex;align-items:center;justify-content:center;font-size:30px;">⚠</div>
    </div>
    <h1 style="font-size:25px;font-weight:800;letter-spacing:-0.02em;color:#fff;line-height:1.15;margin-bottom:12px;">Nepodarilo sa zostaviť plán</h1>
    <p style="font-size:15px;color:rgba(231,214,180,0.8);font-weight:500;line-height:1.5;max-width:290px;margin-bottom:8px;">Akcie z obchodu sa práve nedajú načítať. Môže za to slabé pripojenie alebo dočasný výpadok.</p>

    <!-- detail card -->
    <div style="background:rgba(231,214,180,0.10);border-radius:14px;padding:14px 16px;margin-top:18px;width:100%;max-width:300px;text-align:left;display:flex;align-items:center;gap:12px;">
      <span style="font-size:20px;">📡</span>
      <div><div style="font-size:13px;font-weight:800;color:#fff;">Žiadne pripojenie</div><div style="font-size:12px;color:rgba(231,214,180,0.75);font-weight:500;">Skontroluj internet a skús znova</div></div>
    </div>
  </div>

  <!-- actions -->
  <div style="flex:none;padding:0 24px 34px;position:relative;z-index:1;">
    <button style="width:100%;background:#BA5F3F;color:#fff;border:none;font-family:inherit;font-size:16px;font-weight:700;padding:16px;border-radius:14px;cursor:pointer;margin-bottom:12px;">↻ Skúsiť znova</button>
    <div style="text-align:center;font-size:14px;font-weight:700;color:rgba(231,214,180,0.85);">Zobraziť posledný uložený plán</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}"></script>
</body>
</html>
