<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
<x-dc>
<div style="width:100%;height:100%;background:#FAF6EE;font-family:'Plus Jakarta Sans',sans-serif;color:#204432;overflow:hidden;display:flex;flex-direction:column;">

  <!-- header -->
  <div style="padding:18px 18px 8px;flex:none;display:flex;align-items:center;gap:12px;">
    <div style="width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid rgba(32,68,50,0.1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">arrow_back</div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:14px 24px 18px;">
    <div style="width:48px;height:48px;color:#204432;margin-bottom:22px;"><dc-import name="SporacekMark" hint-size="48px,48px" style="display:block;width:48px;height:48px;color:#204432;"></dc-import></div>
    <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.03em;line-height:1.05;margin-bottom:8px;">Vytvor si účet</h1>
    <p style="font-size:15px;color:#4B6357;font-weight:500;line-height:1.4;margin-bottom:26px;">Aby sme ti uložili obchod, preferencie a tvoju úsporu.</p>

    <!-- social -->
    <div style="display:flex;flex-direction:column;gap:11px;margin-bottom:22px;">
      <button style="width:100%;background:#fff;border:1.5px solid rgba(32,68,50,0.14);font-family:inherit;font-size:15px;font-weight:700;color:#204432;padding:14px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;"><span style="font-size:18px;"></span> Pokračovať s Apple</button>
      <button style="width:100%;background:#fff;border:1.5px solid rgba(32,68,50,0.14);font-family:inherit;font-size:15px;font-weight:700;color:#204432;padding:14px;border-radius:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;"><span style="font-size:17px;font-weight:800;color:#BA5F3F;">G</span> Pokračovať s Google</button>
    </div>

    <!-- divider -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:22px;">
      <div style="flex:1;height:1px;background:rgba(32,68,50,0.12);"></div>
      <span style="font-size:12px;font-weight:700;color:#9AA8A0;">alebo e-mailom</span>
      <div style="flex:1;height:1px;background:rgba(32,68,50,0.12);"></div>
    </div>

    <!-- email field -->
    <div style="font-size:13px;font-weight:800;margin-bottom:8px;">E-mail</div>
    <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(32,68,50,0.12);border-radius:13px;padding:14px 15px;margin-bottom:16px;">
      <span style="font-size:15px;opacity:0.5;">✉️</span>
      <span style="font-size:15px;color:#9AA8A0;font-weight:500;">tvoj@email.sk</span>
    </div>
    <div style="font-size:13px;font-weight:800;margin-bottom:8px;">Heslo</div>
    <div style="display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(32,68,50,0.12);border-radius:13px;padding:14px 15px;margin-bottom:20px;">
      <span style="font-size:15px;opacity:0.5;">🔒</span>
      <span style="flex:1;font-size:15px;color:#204432;font-weight:600;letter-spacing:3px;">••••••••</span>
      <span style="font-size:13px;font-weight:700;color:#BA5F3F;">Zobraziť</span>
    </div>

    <p style="font-size:12px;color:#7A8A80;font-weight:500;line-height:1.45;">Registráciou súhlasíš s <span style="color:#204432;font-weight:700;">podmienkami</span> a <span style="color:#204432;font-weight:700;">ochranou súkromia</span>.</p>
  </div>

  <!-- CTA -->
  <div style="flex:none;padding:14px 24px 26px;background:#fff;border-top:1px solid rgba(32,68,50,0.08);">
    <button style="width:100%;background:#204432;color:#fff;border:none;font-family:inherit;font-size:16px;font-weight:700;padding:16px;border-radius:14px;cursor:pointer;">Vytvoriť účet →</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}"></script>
</body>
</html>
