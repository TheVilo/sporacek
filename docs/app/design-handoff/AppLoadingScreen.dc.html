<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
<x-dc>
<helmet>
  <style>
    @keyframes spk-spin { to { transform: rotate(360deg); } }
    @keyframes spk-pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.06); opacity:0.85; } }
    @keyframes spk-bar { 0% { transform: translateX(-100%); } 100% { transform: translateX(220%); } }
    @keyframes spk-dot { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
  </style>
</helmet>

<div style="width:100%;height:100%;background:#204432;font-family:'Plus Jakarta Sans',sans-serif;color:#E7D6B4;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;position:relative;">

  <!-- faint pattern mark -->
  <div style="position:absolute;top:-40px;right:-50px;width:200px;height:200px;color:rgba(231,214,180,0.06);"><dc-import name="SporacekMark" hint-size="200px,200px" style="display:block;width:200px;height:200px;color:rgba(231,214,180,0.06);"></dc-import></div>
  <div style="position:absolute;bottom:-50px;left:-50px;width:220px;height:220px;color:rgba(231,214,180,0.05);"><dc-import name="SporacekMark" hint-size="220px,220px" style="display:block;width:220px;height:220px;color:rgba(231,214,180,0.05);"></dc-import></div>

  <!-- animated emblem -->
  <div style="position:relative;width:148px;height:148px;display:flex;align-items:center;justify-content:center;margin-bottom:40px;">
    <div style="position:absolute;inset:0;border-radius:50%;border:3px solid rgba(231,214,180,0.16);border-top-color:#BA5F3F;animation:spk-spin 1.1s linear infinite;"></div>
    <div style="width:92px;height:92px;color:#E7D6B4;animation:spk-pulse 1.6s ease-in-out infinite;"><dc-import name="SporacekMark" hint-size="92px,92px" style="display:block;width:92px;height:92px;color:#E7D6B4;"></dc-import></div>
  </div>

  <div style="font-size:13px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:#BA5F3F;margin-bottom:14px;">AI skladá tvoj plán</div>
  <h1 style="font-size:26px;font-weight:800;letter-spacing:-0.02em;color:#fff;text-align:center;line-height:1.15;margin-bottom:10px;">Pripravujeme recepty<br>z dnešných akcií</h1>
  <p style="font-size:14px;color:rgba(231,214,180,0.8);font-weight:500;text-align:center;max-width:280px;line-height:1.45;margin-bottom:32px;">Chvíľku to potrvá. Skladáme jedlá presne podľa tvojich preferencií.</p>

  <!-- progress bar -->
  <div style="width:100%;max-width:300px;height:6px;border-radius:999px;background:rgba(231,214,180,0.14);overflow:hidden;margin-bottom:30px;position:relative;">
    <div style="position:absolute;top:0;bottom:0;width:45%;border-radius:999px;background:#BA5F3F;animation:spk-bar 1.4s ease-in-out infinite;"></div>
  </div>

  <!-- steps -->
  <div style="width:100%;max-width:300px;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:22px;height:22px;border-radius:50%;background:#E7D6B4;color:#204432;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">check</div>
      <span style="font-size:14px;font-weight:600;color:#E7D6B4;">Načítavam akcie z Tesco</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:22px;height:22px;border-radius:50%;background:#E7D6B4;color:#204432;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">check</div>
      <span style="font-size:14px;font-weight:600;color:#E7D6B4;">Vyberám výhodné suroviny</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(231,214,180,0.3);border-top-color:#BA5F3F;animation:spk-spin 0.8s linear infinite;"></div>
      <span style="font-size:14px;font-weight:700;color:#fff;">Skladám recepty na 5 dní</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px;animation:spk-dot 1.4s ease-in-out infinite;">
      <div style="width:22px;height:22px;border-radius:50%;border:2px solid rgba(231,214,180,0.25);"></div>
      <span style="font-size:14px;font-weight:600;color:rgba(231,214,180,0.6);">Počítam cenu za porciu</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}"></script>
</body>
</html>
