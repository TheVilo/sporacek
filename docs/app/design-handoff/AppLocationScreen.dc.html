<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
<x-dc>
<helmet>
  <style>
    @keyframes spkl-ping { 0% { transform: scale(0.6); opacity:0.7; } 100% { transform: scale(2.2); opacity:0; } }
    @keyframes spkl-drop { 0% { transform: translateY(-10px); } 50% { transform: translateY(0); } 100% { transform: translateY(-10px); } }
  </style>
</helmet>
<div style="width:100%;height:100%;background:#FAF6EE;font-family:'Plus Jakarta Sans',sans-serif;color:#204432;overflow:hidden;display:flex;flex-direction:column;">

  <!-- map visual -->
  <div style="flex:1;position:relative;background:#EDE7DA;overflow:hidden;display:flex;align-items:center;justify-content:center;">
    <!-- faux streets -->
    <div style="position:absolute;top:22%;left:0;right:0;height:14px;background:#FAF6EE;transform:rotate(-8deg);"></div>
    <div style="position:absolute;top:55%;left:0;right:0;height:18px;background:#FAF6EE;transform:rotate(4deg);"></div>
    <div style="position:absolute;top:78%;left:0;right:0;height:12px;background:#FAF6EE;transform:rotate(-3deg);"></div>
    <div style="position:absolute;top:0;bottom:0;left:30%;width:14px;background:#FAF6EE;transform:rotate(6deg);"></div>
    <div style="position:absolute;top:0;bottom:0;left:68%;width:16px;background:#FAF6EE;transform:rotate(-5deg);"></div>
    <!-- blocks -->
    <div style="position:absolute;top:30%;left:38%;width:48px;height:38px;background:#E2D9C5;border-radius:5px;"></div>
    <div style="position:absolute;top:62%;left:14%;width:60px;height:44px;background:#E2D9C5;border-radius:5px;"></div>
    <div style="position:absolute;top:60%;left:74%;width:42px;height:50px;background:#E2D9C5;border-radius:5px;"></div>

    <!-- store pins -->
    <div style="position:absolute;top:36%;left:24%;width:30px;height:30px;border-radius:50% 50% 50% 2px;background:#fff;border:2px solid rgba(32,68,50,0.15);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;font-size:13px;"><span style="transform:rotate(45deg);;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">storefront</span></div>
    <div style="position:absolute;top:70%;left:60%;width:30px;height:30px;border-radius:50% 50% 50% 2px;background:#fff;border:2px solid rgba(32,68,50,0.15);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;font-size:13px;"><span style="transform:rotate(45deg);;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">shopping_cart</span></div>

    <!-- you -->
    <div style="position:relative;width:80px;height:80px;display:flex;align-items:center;justify-content:center;">
      <div style="position:absolute;width:80px;height:80px;border-radius:50%;background:rgba(186,95,63,0.4);animation:spkl-ping 2s ease-out infinite;"></div>
      <div style="position:absolute;width:80px;height:80px;border-radius:50%;background:rgba(186,95,63,0.4);animation:spkl-ping 2s ease-out infinite 1s;"></div>
      <div style="width:46px;height:46px;color:#BA5F3F;z-index:1;animation:spkl-drop 2.4s ease-in-out infinite;filter:drop-shadow(0 6px 8px rgba(22,48,33,0.25));"><dc-import name="SporacekMark" hint-size="46px,46px" style="display:block;width:46px;height:46px;color:#BA5F3F;"></dc-import></div>
    </div>
  </div>

  <!-- sheet -->
  <div style="flex:none;background:#fff;border-radius:24px 24px 0 0;margin-top:-24px;padding:26px 24px 30px;box-shadow:0 -8px 30px rgba(22,48,33,0.10);position:relative;z-index:2;">
    <div style="width:42px;height:5px;border-radius:999px;background:rgba(32,68,50,0.12);margin:0 auto 22px;"></div>
    <div style="width:54px;height:54px;border-radius:16px;background:#F0E6D2;display:flex;align-items:center;justify-content:center;font-size:26px;margin-bottom:18px;">📍</div>
    <h1 style="font-size:24px;font-weight:800;letter-spacing:-0.02em;line-height:1.1;margin-bottom:10px;">Povoľ prístup k polohe</h1>
    <p style="font-size:15px;color:#4B6357;font-weight:500;line-height:1.5;margin-bottom:24px;">Nájdeme ti najbližšie obchody a ich dnešné akcie. Polohu používame len na zobrazenie predajní v okolí — nikdy ju nezdieľame.</p>
    <button style="width:100%;background:#204432;color:#fff;border:none;font-family:inherit;font-size:16px;font-weight:700;padding:16px;border-radius:14px;cursor:pointer;margin-bottom:12px;">Povoliť polohu</button>
    <div style="text-align:center;font-size:14px;font-weight:700;color:#7A8A80;">Zadám mesto ručne</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}"></script>
</body>
</html>
