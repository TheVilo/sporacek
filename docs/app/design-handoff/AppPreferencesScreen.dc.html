<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>
<body>
<x-dc>
<div style="width:100%;height:100%;background:#FAF6EE;font-family:'Plus Jakarta Sans',sans-serif;color:#204432;overflow:hidden;display:flex;flex-direction:column;">

  <!-- header -->
  <div style="padding:16px 18px 10px;flex:none;display:flex;align-items:center;gap:12px;">
    <div style="width:32px;height:32px;border-radius:50%;background:#fff;border:1px solid rgba(32,68,50,0.1);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">arrow_back</div>
    <div>
      <div style="font-size:18px;font-weight:800;letter-spacing:-0.02em;">Nastav si varenie</div>
      <div style="font-size:12px;color:#7A8A80;font-weight:600;">Vyber obchody, povedz na čo máš chuť — zvyšok spraví AI</div>
    </div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:8px 18px 18px;">

    <!-- store picker -->
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;">
      <span style="font-size:16px;;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">shopping_cart</span>
      <div style="font-size:14px;font-weight:800;">Kde chceš nakupovať?</div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;">
      <sc-for list="{{ stores }}" as="st" hint-placeholder-count="5">
        <div onClick="{{ st.onClick }}" style="display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:12px;font-size:13.5px;font-weight:800;cursor:pointer;background:{{ st.bg }};color:{{ st.color }};border:{{ st.border }};"><span style="font-size:14px;">{{ st.check }}</span>{{ st.name }}</div>
      </sc-for>
    </div>

    <!-- AI prompt -->
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;">
      <span style="font-size:16px;;font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;line-height:1;">auto_awesome</span>
      <div style="font-size:14px;font-weight:800;">Čo máš dnes chuť?</div>
    </div>
    <div style="background:#204432;border-radius:18px;padding:3px;margin-bottom:12px;box-shadow:0 12px 26px rgba(32,68,50,0.18);">
      <div style="background:#fff;border-radius:15px;padding:14px 15px;">
        <textarea value="{{ prompt }}" onChange="{{ onPromptChange }}" placeholder="Napíš voľne, ako kamarátovi…&#10;napr. „chcem niečo fitnes a rýchle“ alebo „mám chuť na kura s ryžou“" rows="3" style="width:100%;border:none;outline:none;resize:none;font-family:inherit;font-size:14px;line-height:1.5;font-weight:600;color:#204432;background:transparent;"></textarea>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:24px;">
      <sc-for list="{{ suggestions }}" as="s" hint-placeholder-count="5">
        <span onClick="{{ s.onClick }}" style="background:#fff;border:1.5px solid rgba(32,68,50,0.15);color:#4B6357;font-size:12.5px;font-weight:700;padding:7px 13px;border-radius:999px;cursor:pointer;">{{ s.label }}</span>
      </sc-for>
    </div>

    <!-- portions -->
    <div style="font-size:14px;font-weight:800;margin-bottom:12px;">Koľko porcií?</div>
    <sc-for list="{{ portions }}" as="p" hint-placeholder-count="2">
      <div style="display:flex;align-items:center;gap:12px;background:#fff;border:1px solid rgba(32,68,50,0.08);border-radius:14px;padding:11px 14px;margin-bottom:10px;">
        <span style="font-size:20px;">{{ p.glyph }}</span>
        <div style="flex:1;font-size:15px;font-weight:800;">{{ p.label }}</div>
        <div onClick="{{ p.dec }}" style="width:34px;height:34px;border-radius:50%;background:#F0E6D2;color:#204432;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;">−</div>
        <div style="min-width:22px;text-align:center;font-size:17px;font-weight:800;">{{ p.count }}</div>
        <div onClick="{{ p.inc }}" style="width:34px;height:34px;border-radius:50%;background:#204432;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;cursor:pointer;">+</div>
      </div>
    </sc-for>

    <!-- days -->
    <div style="font-size:14px;font-weight:800;margin:18px 0 12px;">Na koľko dní?</div>
    <div style="display:flex;gap:8px;">
      <sc-for list="{{ days }}" as="d" hint-placeholder-count="4">
        <div onClick="{{ d.onClick }}" style="flex:1;text-align:center;padding:14px 4px;border-radius:14px;font-size:14px;font-weight:800;cursor:pointer;background:{{ d.bg }};color:{{ d.color }};border:{{ d.border }};">{{ d.label }}</div>
      </sc-for>
    </div>
  </div>

  <!-- sticky CTA -->
  <div style="flex:none;padding:14px 18px 24px;background:#fff;border-top:1px solid rgba(32,68,50,0.08);">
    <button style="width:100%;background:#204432;color:#fff;border:none;font-family:inherit;font-size:16px;font-weight:700;padding:16px;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">✨ Nechaj AI navariť plán →</button>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844}}">
class Component extends DCLogic {
  state = {
    stores: ["Lidl", "Tesco"],
    prompt: "Chcem niečo fitnes a rýchle, na obed kura s ryžou",
    adults: 2,
    kids: 1,
    days: 5,
  };

  STORE_LIST = ["Lidl", "Tesco", "Kaufland", "Billa", "COOP"];
  DAY_OPTS = [1, 3, 5, 7];

  toggleStore(name) {
    this.setState(s => {
      const has = s.stores.includes(name);
      return { stores: has ? s.stores.filter(x => x !== name) : [...s.stores, name] };
    });
  }

  step(key, delta, min) {
    this.setState(s => ({ [key]: Math.max(min, s[key] + delta) }));
  }

  renderVals() {
    const stores = this.STORE_LIST.map(name => {
      const on = this.state.stores.includes(name);
      return {
        name,
        onClick: () => this.toggleStore(name),
        check: on ? "✓" : "+",
        bg: on ? "#204432" : "#fff",
        color: on ? "#fff" : "#4B6357",
        border: on ? "none" : "1.5px solid rgba(32,68,50,0.15)",
      };
    });

    const suggestionLabels = [
      "🥗 Vegetariánske & rýchle",
      "🍗 Kura s ryžou",
      "💪 Niečo fitnes",
      "💸 Lacné a sýte",
      "🌾 Bezlepkové",
    ];
    const suggestions = suggestionLabels.map(label => ({
      label,
      onClick: () => this.setState({ prompt: label.replace(/^[^\s]+\s/, "") }),
    }));

    const portions = [
      { key: "adults", glyph: "🧑", label: "Dospelí", count: this.state.adults, min: 1 },
      { key: "kids", glyph: "🧒", label: "Deti", count: this.state.kids, min: 0 },
    ].map(p => ({
      ...p,
      inc: () => this.step(p.key, 1, p.min),
      dec: () => this.step(p.key, -1, p.min),
    }));

    const days = this.DAY_OPTS.map(n => {
      const on = this.state.days === n;
      return {
        label: n === 1 ? "1 deň" : n + " dní",
        onClick: () => this.setState({ days: n }),
        bg: on ? "#204432" : "#fff",
        color: on ? "#fff" : "#4B6357",
        border: on ? "none" : "1.5px solid rgba(32,68,50,0.12)",
      };
    });

    return {
      stores,
      prompt: this.state.prompt,
      onPromptChange: (e) => this.setState({ prompt: e.target.value }),
      suggestions,
      portions,
      days,
    };
  }
}
</script>
</body>
</html>
