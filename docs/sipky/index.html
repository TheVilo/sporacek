<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0f14">
<title>Čiara — šípky</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='46' fill='%230d0f14'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%23c6f24e' stroke-width='6'/%3E%3Ccircle cx='50' cy='50' r='10' fill='%23ff5964'/%3E%3C/svg%3E">
</head>
<body>

<!-- ===== SETUP ===== -->
<section id="setup" class="screen active">
  <div class="brand">
    <div class="brand-mark" aria-hidden="true"></div>
    <div class="brand-text">
      <h1>Čiara</h1>
      <p>šípky · score bez zdržania</p>
    </div>
  </div>

  <div class="card setup-card">
    <h2 class="section-label">Hra</h2>
    <div class="mode-grid" id="modeGrid">
      <button class="mode-btn active" data-mode="x01" data-start="501">
        <span class="mode-title">501</span>
        <span class="mode-sub">klasika</span>
      </button>
      <button class="mode-btn" data-mode="x01" data-start="301">
        <span class="mode-title">301</span>
        <span class="mode-sub">rýchla</span>
      </button>
      <button class="mode-btn" data-mode="x01" data-start="701">
        <span class="mode-title">701</span>
        <span class="mode-sub">dlhá</span>
      </button>
      <button class="mode-btn" data-mode="cricket">
        <span class="mode-title">Cricket</span>
        <span class="mode-sub">15–20 + bull</span>
      </button>
    </div>

    <div class="options-row" id="x01Options">
      <label class="opt-toggle">
        <input type="checkbox" id="doubleOut" checked>
        <span class="opt-track"><span class="opt-thumb"></span></span>
        <span class="opt-label">Double out <small>(záver dvojkou)</small></span>
      </label>
    </div>

    <div class="options-row">
      <div class="stepper">
        <span class="opt-label">Počet legov <small>(best of)</small></span>
        <div class="stepper-ctrl">
          <button type="button" class="step-btn" data-legs="-1">−</button>
          <span id="legsVal">1</span>
          <button type="button" class="step-btn" data-legs="1">+</button>
        </div>
      </div>
    </div>

    <h2 class="section-label">Hráči</h2>
    <div id="playerList" class="player-list"></div>
    <button id="addPlayer" class="ghost-btn">+ Pridať hráča</button>

    <button id="startGame" class="primary-btn">Spustiť hru</button>
  </div>

  <p class="footnote">Multiplayer na jednom zariadení — podávaj si telefón medzi hodmi. Skóre, busty aj checkouty počíta appka za teba.</p>
</section>

<!-- ===== GAME ===== -->
<section id="game" class="screen">
  <header class="game-head">
    <button id="exitBtn" class="icon-btn" title="Ukončiť">✕</button>
    <div class="game-head-title">
      <span id="gameTitle">501</span>
      <span id="gameSub" class="game-head-sub"></span>
    </div>
    <button id="undoBtn" class="icon-btn" title="Späť">⟲</button>
  </header>

  <div id="board" class="board"></div>

  <div class="input-zone">
    <div class="turn-bar">
      <div id="dartSlots" class="dart-slots">
        <span class="dart-slot"></span>
        <span class="dart-slot"></span>
        <span class="dart-slot"></span>
      </div>
      <div id="turnMeta" class="turn-meta"></div>
    </div>

    <div class="mult-row" id="multRow">
      <button class="mult-btn active" data-mult="1">Single</button>
      <button class="mult-btn" data-mult="2">Double</button>
      <button class="mult-btn" data-mult="3">Triple</button>
    </div>

    <div id="pad" class="pad"></div>

    <div class="action-row">
      <button id="missBtn" class="action-btn miss">Miss</button>
      <button id="nextBtn" class="action-btn next">Ďalší hráč →</button>
    </div>
  </div>
</section>

<!-- ===== WIN OVERLAY ===== -->
<div id="winOverlay" class="overlay">
  <div class="win-card">
    <div class="win-burst" aria-hidden="true"></div>
    <p class="win-kicker" id="winKicker">Víťaz</p>
    <h2 id="winName">—</h2>
    <p id="winDetail" class="win-detail"></p>
    <div class="win-actions">
      <button id="rematchBtn" class="primary-btn">Odveta</button>
      <button id="newGameBtn" class="ghost-btn">Nová hra</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
